# SimpleAIFolio Gateway — sits behind Nginx Proxy Manager or external reverse proxy
#
# This gateway listens on port 80 (HTTP only). The external reverse proxy
# handles TLS termination and forwards decrypted traffic here.
#
# Dynamic Docker DNS resolution ensures containers are reachable after recreation.

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    client_max_body_size 12m;

    # Health check endpoint for Docker
    location /healthz {
        return 200;
    }

    # MCP protocol endpoint -> MCP server
    # The MCP transport can stream responses, so buffering is disabled.
    location /mcp {
        set $mcp http://mcp-server:3100;
        proxy_pass $mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API requests → backend
    location /api/ {
        set $backend http://backend:3001;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded media → backend
    location /uploads/ {
        set $backend http://backend:3001;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # Everything else (including /feed.xml, pages, static assets) → frontend
    location / {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
