# SimpleAIFolio — Production Nginx Configuration
#
# This config routes traffic to the SimpleAIFolio containers.
# The `resolver` directive with Docker DNS is critical: when containers are
# recreated, they get new IP addresses. Without dynamic resolution, nginx
# caches the old IP and returns 502 after redeployment.
#
# Usage:
#   1. Create a reverse proxy container that joins the proxy network
#   2. Mount this config into the nginx container
#   3. Set up SSL certificates (use certbot or Caddy's automatic TLS)

# Docker's built-in DNS resolver — refreshes every 10 seconds
resolver 127.0.0.11 valid=10s ipv6=off;

# Upstream definitions using Docker DNS (dynamic)
# These resolve to the current container IPs, updated on container recreation
upstream simpleaifolio_backend {
    server backend:3001;
}

upstream simpleaifolio_frontend {
    server frontend:3000;
}

# HTTP — redirect to HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# HTTPS — Frontend (main site)
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates (adjust paths)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # API requests → backend container
    location /api/ {
        proxy_pass http://simpleaifolio_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads → backend container
    location /uploads/ {
        proxy_pass http://simpleaifolio_backend;
        proxy_set_header Host $host;
    }

    # RSS feed → backend
    location /feed.xml {
        proxy_pass http://simpleaifolio_backend;
        proxy_set_header Host $host;
    }

    # Everything else → frontend container
    location / {
        proxy_pass http://simpleaifolio_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Next.js HMR in dev, not needed in prod but harmless)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS — MCP Server (optional, only if exposing MCP remotely)
server {
    listen 443 ssl http2;
    server_name mcp.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/mcp.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://simpleaifolio_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
