# Production Docker Compose for SimpleAIFolio
#
# Usage:
#   cp .env.example .env  (edit with production values)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Network topology:
#   app (internal)     — db, backend, frontend, mcp, gateway (no internet)
#   egress (bridge)    — backend only (OpenAI, Exa, webhooks)
#   proxy (external)   — gateway + external reverse proxy (Nginx Proxy Manager)
#
# No host ports published. The gateway listens on port 80 inside the proxy network.
# The external reverse proxy (NPM, Caddy) handles TLS termination.

name: simpleaifolio

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: simpleaifolio
      POSTGRES_USER: simpleaifolio
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - simpleaifolio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simpleaifolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://simpleaifolio:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/simpleaifolio
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
      FRONTEND_INTERNAL_URL: http://frontend:3000
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?Set REVALIDATE_SECRET in .env}
      AI_ALERT_WEBHOOK_URL: ${AI_ALERT_WEBHOOK_URL:-}
      AI_ALERT_MIN_LEVEL: ${AI_ALERT_MIN_LEVEL:-warning}
      AI_ALERT_COOLDOWN_MS: ${AI_ALERT_COOLDOWN_MS:-300000}
      AI_ALERT_FAILURE_THRESHOLD: ${AI_ALERT_FAILURE_THRESHOLD:-3}
      AI_ALERT_HIGH_LATENCY_MS: ${AI_ALERT_HIGH_LATENCY_MS:-15000}
      AI_ALERT_LATENCY_THRESHOLD: ${AI_ALERT_LATENCY_THRESHOLD:-3}
      AI_ALERT_LOOKBACK_MS: ${AI_ALERT_LOOKBACK_MS:-900000}
      AI_ALERT_COST_LOOKBACK_MS: ${AI_ALERT_COST_LOOKBACK_MS:-3600000}
      AI_ALERT_COST_SPIKE_MULTIPLIER: ${AI_ALERT_COST_SPIKE_MULTIPLIER:-1.5}
      AI_ALERT_COST_SPIKE_MIN_USD: ${AI_ALERT_COST_SPIKE_MIN_USD:-1}
      AI_ALERT_COST_SPIKE_MIN_DELTA_USD: ${AI_ALERT_COST_SPIKE_MIN_DELTA_USD:-0.5}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      RUN_SEED_ON_STARTUP: "true"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:?Set SEED_ADMIN_EMAIL in .env}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD in .env}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
    volumes:
      - simpleaifolio_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app
      - egress

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://yourdomain.com}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://yourdomain.com}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?Set REVALIDATE_SECRET in .env}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      MCP_API_URL: http://backend:3001
      MCP_AUTH_EMAIL: ${SEED_ADMIN_EMAIL:?Set SEED_ADMIN_EMAIL in .env}
      MCP_AUTH_PASSWORD: ${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD in .env}
      MCP_HTTP: "true"
      MCP_HTTP_PORT: "3100"
      MCP_MCP_CONFIG_URL: http://backend:3001/api/mcp-config
    networks:
      - app

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app
      - proxy

networks:
  app:
    name: simpleaifolio_app
    internal: true

  egress:
    name: simpleaifolio_egress
    driver: bridge

  proxy:
    name: ${EXTERNAL_PROXY_NETWORK:-proxy_default}
    external: true

volumes:
  simpleaifolio_pgdata:
    name: simpleaifolio_pgdata
  simpleaifolio_uploads:
    name: simpleaifolio_uploads
