services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: SimpleAIFolio
      POSTGRES_USER: SimpleAIFolio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SimpleAIFolio_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U SimpleAIFolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://SimpleAIFolio:${DB_PASSWORD:-SimpleAIFolio_secret}@db:5432/SimpleAIFolio
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-before-production-2026}
      ALLOW_INSECURE_JWT_SECRET: "true"
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3200}
      FRONTEND_INTERNAL_URL: ${FRONTEND_INTERNAL_URL:-http://frontend:3000}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-local-dev-revalidate-secret}
      AI_ALERT_WEBHOOK_URL: ${AI_ALERT_WEBHOOK_URL:-}
      AI_ALERT_MIN_LEVEL: ${AI_ALERT_MIN_LEVEL:-warning}
      AI_ALERT_COOLDOWN_MS: ${AI_ALERT_COOLDOWN_MS:-300000}
      AI_ALERT_FAILURE_THRESHOLD: ${AI_ALERT_FAILURE_THRESHOLD:-3}
      AI_ALERT_HIGH_LATENCY_MS: ${AI_ALERT_HIGH_LATENCY_MS:-15000}
      AI_ALERT_LATENCY_THRESHOLD: ${AI_ALERT_LATENCY_THRESHOLD:-3}
      AI_ALERT_LOOKBACK_MS: ${AI_ALERT_LOOKBACK_MS:-900000}
      AI_ALERT_COST_LOOKBACK_MS: ${AI_ALERT_COST_LOOKBACK_MS:-3600000}
      AI_ALERT_COST_SPIKE_MULTIPLIER: ${AI_ALERT_COST_SPIKE_MULTIPLIER:-1.5}
      AI_ALERT_COST_SPIKE_MIN_USD: ${AI_ALERT_COST_SPIKE_MIN_USD:-1}
      AI_ALERT_COST_SPIKE_MIN_DELTA_USD: ${AI_ALERT_COST_SPIKE_MIN_DELTA_USD:-0.5}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      RUN_SEED_ON_STARTUP: "true"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@SimpleAIFolio.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
    volumes:
      - uploads:/app/uploads
    ports:
      - "3201:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3201}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3200}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_INTERNAL_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3201}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3200}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-local-dev-revalidate-secret}
    ports:
      - "3200:3000"

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      MCP_API_URL: http://backend:3001
      MCP_AUTH_EMAIL: ${SEED_ADMIN_EMAIL:-admin@SimpleAIFolio.com}
      MCP_AUTH_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      MCP_HTTP: "true"
      MCP_HTTP_PORT: "3100"
      MCP_MCP_CONFIG_URL: http://backend:3001/api/mcp-config
    ports:
      - "3100:3100"

volumes:
  pgdata:
  uploads:
